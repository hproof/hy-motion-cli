name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        shell: bash
        run: |
          go build -ldflags="-s -w" -o hy-motion-cli.exe ./src/main.go

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: hy-motion-cli.exe
          generate_release_notes: true
