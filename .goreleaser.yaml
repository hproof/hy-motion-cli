project_name: hy-motion-cli
builds:
  - id: hy-motion-cli
    main: ./src/main.go
    binary: hy-motion-cli
    goos:
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w
checksum:
  name_template: 'checksums.txt'
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^meta:'
